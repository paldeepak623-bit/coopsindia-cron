name: CoopsIndia 7AM Dispatch

on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "35 1 * * *"
    - cron: "40 1 * * *"
    - cron: "45 1 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Fire daily job at 7AM IST window
        env:
          GH_TOKEN: ${{ secrets.COOPS_CRON_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/paldeepak623-bit/coopsindia-daily-automation/dispatches \
            -d '{"event_type":"coops-daily-run"}'
