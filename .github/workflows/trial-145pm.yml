name: Trial 145PM Wait Trigger

on:
  workflow_dispatch:

jobs:
  wait-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wait until 1:45 PM IST
        run: |
          TARGET=$(TZ=Asia/Kolkata date -d '2026-06-22 13:45:00' +%s)
          NOW=$(date +%s)
          WAIT=$((TARGET - NOW))
          echo "Now IST: $(TZ=Asia/Kolkata date)"
          echo "Wait seconds: $WAIT"
          if [ "$WAIT" -gt 0 ]; then sleep "$WAIT"; fi
          echo "Trigger time IST: $(TZ=Asia/Kolkata date)"
      - name: Trigger CoopsIndia daily job
        env:
          GH_TOKEN: ${{ secrets.COOPS_CRON_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/paldeepak623-bit/coopsindia-daily-automation/dispatches \
            -d '{"event_type":"coops-daily-run"}'
