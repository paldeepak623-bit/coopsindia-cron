name: CoopsIndia Cron Trigger

on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "25 1 * * *"
    - cron: "30 1 * * *"
    - cron: "35 1 * * *"
  workflow_dispatch:

jobs:
  wait-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wait until 7:00 AM IST
        run: |
          TARGET=$(TZ=Asia/Kolkata date -d "$(TZ=Asia/Kolkata date +%Y-%m-%d) 07:00:00" +%s)
          NOW=$(date +%s)
          WAIT=$((TARGET - NOW))
          echo "IST now: $(TZ=Asia/Kolkata date)"
          echo "Wait seconds: $WAIT"
          if [ "$WAIT" -gt 0 ]; then sleep "$WAIT"; fi
          echo "Trigger IST: $(TZ=Asia/Kolkata date)"

      - name: Trigger CoopsIndia daily job
        env:
          GH_TOKEN: ${{ secrets.COOPS_CRON_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/paldeepak623-bit/coopsindia-daily-automation/dispatches \
            -d '{"event_type":"coops-daily-run"}'
